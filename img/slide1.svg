<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2149"/>
      <stop offset="100%" stop-color="#040d1e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fundo do espaço -->
  <rect width="1200" height="420" fill="url(#bg1)"/>
  <!-- Estrelas -->
  <circle cx="50" cy="30" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="180" cy="80" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="320" cy="20" r="1" fill="white" opacity="0.9"/>
  <circle cx="450" cy="60" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="600" cy="40" r="1.3" fill="white" opacity="0.7"/>
  <circle cx="750" cy="15" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="900" cy="70" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="1050" cy="30" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="1150" cy="90" r="1" fill="white" opacity="0.7"/>
  <circle cx="100" cy="200" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="280" cy="180" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="700" cy="300" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="850" cy="380" r="1" fill="white" opacity="0.7"/>
  <circle cx="1100" cy="250" r="0.8" fill="white" opacity="0.9"/>
  <!-- Terra -->
  <circle cx="200" cy="380" r="260" fill="#1a4fa0" opacity="0.9"/>
  <circle cx="200" cy="380" r="260" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <!-- Continentes (forma simplificada) -->
  <ellipse cx="170" cy="250" rx="55" ry="35" fill="#2d7a3a" opacity="0.8"/>
  <ellipse cx="250" cy="290" rx="40" ry="25" fill="#2d7a3a" opacity="0.7"/>
  <!-- Atmosfera glow -->
  <circle cx="200" cy="380" r="268" fill="none" stroke="#4a9eff" stroke-width="4" opacity="0.3"/>
  <!-- Órbita -->
  <ellipse cx="580" cy="210" rx="420" ry="120" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5"/>
  <!-- Satélite CBERS-4A -->
  <g transform="translate(940, 120) rotate(15)">
    <rect x="-18" y="-8" width="36" height="16" fill="#c0c8d8" rx="2"/>
    <rect x="-50" y="-3" width="32" height="6" fill="#2563eb" opacity="0.9"/>
    <rect x="18" y="-3" width="32" height="6" fill="#2563eb" opacity="0.9"/>
    <rect x="-3" y="-18" width="6" height="12" fill="#888"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.8"/>
  </g>
  <!-- Glow do satélite -->
  <circle cx="940" cy="120" r="30" fill="url(#glow)"/>
  <!-- Detritos -->
  <circle cx="400" cy="80" r="3" fill="#dc2626" opacity="0.9"/>
  <circle cx="760" cy="330" r="2.5" fill="#dc2626" opacity="0.8"/>
  <circle cx="1100" cy="170" r="3.5" fill="#dc2626" opacity="0.7"/>
  <circle cx="600" cy="350" r="2" fill="#f97316" opacity="0.9"/>
  <circle cx="350" cy="310" r="2.8" fill="#dc2626" opacity="0.8"/>
  <!-- Rastros dos detritos -->
  <line x1="395" y1="78" x2="375" y2="70" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="755" y1="328" x2="735" y2="322" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
</svg>
